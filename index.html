<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Sweater Rajut Grosir | Malik x Denzi Majalaya</title>
<style>
  :root{--bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#94a3b8; --accent:#ee4d2d; --wa:#25D366; --accent2:#fbbf24;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text)}
  header{padding:20px;text-align:center;background:var(--card);border-bottom:1px solid #334155;position:sticky;top:0;z-index:10}
  header h1{margin:0;font-size:20px}
  header p{margin:5px 0 0;color:var(--muted);font-size:13px}
  .search-box{max-width:500px;margin:12px auto 0;padding:0 16px}
  .search-box input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:var(--text);font-size:14px;outline:none}
  .search-box input:focus{border-color:var(--accent)}
  .container{max-width:1200px;margin:0 auto;padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  @media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}}
  .card{background:var(--card);border:1px solid #334155;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:.2s}
  .card:hover{transform:translateY(-2px);border-color:#475569}
  .card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#0b1220}
  .card-body{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}
  .title{font-weight:600;font-size:13px;line-height:1.3;height:34px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .price{color:var(--accent2);font-weight:800;font-size:14px}
  .btn-wrap{display:flex;gap:6px;margin-top:auto}
  .btn{flex:1;padding:8px;border-radius:8px;text-align:center;font-weight:700;font-size:12px;text-decoration:none;color:#fff}
  .btn-shopee{background:var(--accent)}
  .btn-wa{background:var(--wa);color:#0f172a}
  .btn:hover{filter:brightness(1.1)}
  .hidden{display:none !important}
  footer{text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid #334155;margin-top:20px}
</style>
</head>
<body>

<header>
  <h1>Katalog Sweater Rajut Grosir</h1>
  <p>Malik x Denzi | Min 10 Pcs | Harga Pabrik Majalaya</p>
  <div class="search-box">
    <input type="text" id="search" placeholder="Cari produk... misal: cream, hitam, oversize">
  </div>
</header>

<main class="container">

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');

function renderProduk(list) {
  grid.innerHTML = '';
  list.forEach(p => {
    grid.insertAdjacentHTML('beforeend', `
      <div class="card" data-nama="${p.nama.toLowerCase()}">
        <img src="${p.img}" alt="${p.nama}" loading="lazy">
        <div class="card-body">
          <div class="title">${p.nama}</div>
          <div class="price">${p.harga}</div>
          <div class="btn-wrap">
            <a class="btn btn-shopee" href="${LINK_SHOPEE}" target="_blank" rel="noopener">Shopee</a>
            <a class="btn btn-wa" href="${LINK_WA}%20${encodeURIComponent(p.nama)}" target="_blank" rel="noopener">WA</a>
          </div>
        </div>
      </div>
    `);
  });
}

renderProduk(PRODUK);

// Fitur Cari
searchInput.addEventListener('input', (e) => {
  const keyword = e.target.value.toLowerCase();
  const filtered = PRODUK.filter(p => p.nama.toLowerCase().includes(keyword));
  renderProduk(filtered);
});
