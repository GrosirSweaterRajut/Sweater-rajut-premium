<style>
  :root{--bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#94a3b8; --accent:#ee4d2d; --wa:#25D366; --accent2:#fbbf24;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text)}
  header{padding:24px 16px;text-align:center;background:var(--card);border-bottom:1px solid #334155;position:sticky;top:0;z-index:10}
  header h1{margin:0;font-size:22px;font-weight:800}
  header p{margin:6px 0 12px;color:var(--muted);font-size:13px}
  
  .shopee-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-weight:700;font-size:13px;transition:.2s}
  .shopee-badge:hover{filter:brightness(1.1)}
  .shopee-badge svg{width:18px;height:18px;fill:#fff}

  .search-box{max-width:500px;margin:16px auto 0;padding:0 16px}
  .search-box input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:var(--text);font-size:14px;outline:none}
  .search-box input:focus{border-color:var(--accent)}
  
  .container{max-width:1200px;margin:0 auto;padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  @media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}}
  
  .card{background:var(--card);border:1px solid #334155;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:.2s}
  .card:hover{transform:translateY(-2px);border-color:#475569}
  .card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#0b1220}
  .card-body{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}
  .title{font-weight:600;font-size:13px;line-height:1.3;height:34px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .price{color:var(--accent2);font-weight:800;font-size:14px}
  .btn-wrap{display:flex;gap:6px;margin-top:auto}
  .btn{flex:1;padding:8px;border-radius:8px;text-align:center;font-weight:700;font-size:12px;text-decoration:none;color:#fff}
  .btn-shopee{background:var(--accent)}
  .btn-wa{background:var(--wa);color:#0f172a}
  .btn:hover{filter:brightness(1.1)}
  .hidden{display:none !important}
  
  .wa-float{position:fixed;bottom:20px;right:20px;z-index:50;width:56px;height:56px;background:var(--wa);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:.2s}
  .wa-float:hover{transform:scale(1.1)}
  .wa-float svg{width:28px;height:28px;fill:#0f172a}

  footer{text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid #334155;margin-top:20px}

const searchInput = document.getElementById('search');

        </div>

}

});
